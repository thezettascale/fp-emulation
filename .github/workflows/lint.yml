name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check src/ tests/ notebooks/
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check src/ tests/ notebooks/
